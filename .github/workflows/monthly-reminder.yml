name: Monthly Expense Reminder

on:
  schedule:
    # Runs at 9:00 AM UTC on the last day of every month
    - cron: '0 9 28-31 * *'

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Check if last day of month
        id: check
        run: |
          tomorrow=$(date -d "+1 day" +%d)
          if [ "$tomorrow" = "01" ]; then
            echo "is_last_day=true" >> $GITHUB_OUTPUT
          else
            echo "is_last_day=false" >> $GITHUB_OUTPUT
          fi

      - name: Send email reminder
        if: steps.check.outputs.is_last_day == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Expense Tracker - Month End Reminder"
          to: nfytali@gmail.com
          from: Expense Tracker <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Hi!

            This is your monthly reminder that the current month is ending.

            Please review your expenses and download your CSV report before the month closes.

            Visit your Expense Tracker: https://${{ github.repository_owner }}.github.io/expense-tracker/

            - Your Expense Tracker
