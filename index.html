<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
            <p class="subtitle">Track your monthly expenses</p>
        </header>

        <!-- Month Selector -->
        <div class="card month-selector">
            <label for="monthPicker">Month:</label>
            <input type="month" id="monthPicker">
        </div>

        <!-- Salary Section -->
        <div class="card salary-section" id="salarySection">
            <h2>Monthly Salary</h2>
            <div id="salaryDisplay" class="hidden">
                <div class="salary-info">
                    <span class="label">Salary:</span>
                    <span id="salaryAmount" class="amount">$0</span>
                    <button class="btn btn-small btn-edit" onclick="editSalary()">Edit</button>
                </div>
            </div>
            <div id="salaryForm">
                <div class="input-group">
                    <input type="number" id="salaryInput" placeholder="Enter your monthly salary" min="0" step="0.01">
                    <button class="btn btn-primary" onclick="setSalary()">Set Salary</button>
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div class="card summary" id="summarySection">
            <h2>Summary</h2>
            <div class="summary-grid">
                <div class="summary-item income">
                    <span class="label">Salary</span>
                    <span id="summarySalary" class="value">$0.00</span>
                </div>
                <div class="summary-item expenses">
                    <span class="label">Total Expenses</span>
                    <span id="summaryExpenses" class="value">$0.00</span>
                </div>
                <div class="summary-item remaining">
                    <span class="label">Remaining</span>
                    <span id="summaryRemaining" class="value">$0.00</span>
                </div>
            </div>
        </div>

        <!-- Add Expense -->
        <div class="card add-expense">
            <h2>Add Expense</h2>
            <form id="expenseForm" onsubmit="addExpense(event)">
                <div class="form-row">
                    <div class="input-group">
                        <label for="expenseDesc">Description</label>
                        <input type="text" id="expenseDesc" placeholder="What was the expense for?" required>
                    </div>
                    <div class="input-group">
                        <label for="expenseAmount">Amount</label>
                        <input type="number" id="expenseAmount" placeholder="0.00" min="0.01" step="0.01" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="expenseCategory">Category</label>
                        <select id="expenseCategory" required>
                            <option value="">Select category</option>
                            <option value="food">Food</option>
                            <option value="coffee">Coffee</option>
                            <option value="clothes">Clothes</option>
                            <option value="car utilities">Car Utilities</option>
                            <option value="revolut transfer">Revolut Transfer</option>
                            <option value="work">Work</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="expenseDate">Date</label>
                        <input type="date" id="expenseDate" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Add Expense</button>
            </form>
        </div>

        <!-- Category Breakdown -->
        <div class="card" id="categorySection">
            <h2>Category Breakdown</h2>
            <div id="categoryBreakdown" class="category-list"></div>
        </div>

        <!-- Expenses List -->
        <div class="card">
            <div class="expenses-header">
                <h2>Expenses</h2>
                <button class="btn btn-secondary" onclick="downloadCSV()">Download CSV</button>
            </div>
            <div id="expensesList" class="expenses-list"></div>
            <div id="noExpenses" class="empty-state">No expenses yet. Add your first expense above.</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
